version: '3.8'

services:
  jenkins:
    image: jenkins/jenkins:lts
    container_name: local_jenkins
    user: root
    ports:
      - "8080:8080"
    volumes:
      - jenkins_data:/var/jenkins_home
  minio:
    image: minio/minio
    container_name: local_s3
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # Сюда будет стучаться DVC
      - "9001:9001" # Веб-интерфейс
    environment:
      MINIO_ROOT_USER: admin_dvc      
      MINIO_ROOT_PASSWORD: superpassword 
    volumes:
      - minio_data:/data

volumes:
  jenkins_data:
  minio_data: